{% extends 'movies/base.html' %}
{% block content %}

<!-- 🎬 HERO SECTION -->
<div class="movie-hero" style="background-image: url('{{ movie.poster.url }}');">

  <div class="overlay"></div>

  <div class="container hero-content">

    <div class="row align-items-center">

      <!-- Poster -->
      <div class="col-md-4 text-center mb-4 mb-md-0">
        <img src="{{ movie.poster.url }}" class="detail-poster shadow-lg">
      </div>

      <!-- Details -->
      <div class="col-md-8 text-white">

        <h1 class="fw-bold">{{ movie.title }}</h1>

        <div class="mb-2">
          <span class="badge bg-warning text-dark fs-6">
            ⭐ {{ movie.rating }}/10
          </span>

          <span class="badge bg-secondary fs-6">
            {{ movie.get_genre_display }}
          </span>
        </div>

        <p class="mt-3 text-light">
          {{ movie.description }}
        </p>

        <!-- Buttons -->
        <div class="mt-4 d-flex gap-2 flex-wrap">

          

          <a href="{% url 'movies:movie_update' movie.pk %}" 
             class="btn btn-outline-light px-4">
            ✏ Edit
          </a>

          <a href="{% url 'movies:movie_delete' movie.pk %}" 
             class="btn btn-outline-danger px-4">
            🗑 Delete
          </a>

        </div>

      </div>

    </div>

  </div>

</div>

{% endblock %}
